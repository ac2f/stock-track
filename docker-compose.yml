services:
  postgres:
    image: postgres:16-alpine
    container_name: stocktrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-stocktrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stocktrack}
      POSTGRES_DB: ${DB_NAME:-stocktrack}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-stocktrack}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: stocktrack-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    # Yatay ölçekleme örneği: docker compose up --scale api=3
    # Stateless olduğu için her replika bağımsızdır.

volumes:
  pgdata:
