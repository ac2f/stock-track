services:
  postgres:
    image: postgres:16-alpine
    container_name: stocktrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-stocktrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stocktrack}
      POSTGRES_DB: ${DB_NAME:-stocktrack}
    ports:
      - '5432:5432'
    volumes:
      # Veritabanı KALICI: 'pgdata' adlı Docker volume'ünde tutulur; container
      # silinse bile veriler korunur (yalnızca `docker compose down -v` siler).
      - pgdata:/var/lib/postgresql/data
      #
      # ── Windows'ta belirli bir klasörü volume olarak kullanmak ──
      # Yukarıdaki satırı yoruma alıp aşağıdakilerden BİRİNİ açın. Böylece
      # veritabanı dosyaları seçtiğiniz klasörde fiziksel olarak durur:
      #
      #   - 'C:/stocktrack/pgdata:/var/lib/postgresql/data'
      # veya (PowerShell mutlak yol):
      #   - '//c/Users/Kullanici/stocktrack/pgdata:/var/lib/postgresql/data'
      #
      # Notlar:
      #   * Docker Desktop > Settings > Resources > File Sharing içinde ilgili
      #     sürücü/dizin paylaşıma açık olmalı.
      #   * Klasör önceden var olmalı; yol ileri eğik çizgi (/) ile yazılmalı.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-stocktrack}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: stocktrack-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    # Yatay ölçekleme örneği: docker compose up --scale api=3
    # Stateless olduğu için her replika bağımsızdır.

volumes:
  # Adlandırılmış kalıcı volume (Docker yönetir). Windows'ta klasör bağlamak
  # isterseniz yukarıdaki postgres > volumes yorumlarına bakın.
  pgdata:
