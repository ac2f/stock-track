server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Yüklemeler için makul bir gövde sınırı (logo vb.).
  client_max_body_size 20m;

  # API ters proxy: '/api/...' istekleri backend (api servisi, 3000) konteynerine
  # iletilir. Böylece arayüz ile API AYNI origin'den sunulur → port/CORS sorunu yok,
  # yerel ağdaki her cihaz http://<sunucu-ip>/ ile çalışır.
  location /api/ {
    # Docker'ın gömülü DNS'i ile çalışma-zamanında çöz (api konteyneri yeniden
    # başlasa/IP değişse bile proxy kırılmaz). Değişken kullanımı, tam istek
    # URI'sinin ('/api/v1/...') olduğu gibi backend'e iletilmesini sağlar.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # SPA: bilinmeyen yollar index.html'e düşer (React Router client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Statik varlıkları uzun süre önbellekle (hash'li dosya adları).
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
