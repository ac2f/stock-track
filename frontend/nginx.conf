server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: bilinmeyen yollar index.html'e düşer (React Router client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Statik varlıkları uzun süre önbellekle (hash'li dosya adları).
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
